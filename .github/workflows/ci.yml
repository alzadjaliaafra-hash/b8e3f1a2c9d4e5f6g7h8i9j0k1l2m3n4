name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend:
    name: Go backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Download deps
        run: go mod download
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...

  frontend:
    name: Angular frontend (type-check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm install --no-audit --no-fund
      - name: Type-check
        run: npx tsc --noEmit

  python-rvs:
    name: Python RVS sidecar (import smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/python_rvs_service/requirements.txt
      - name: Install deps
        run: pip install -r backend/python_rvs_service/requirements.txt
      - name: Import sidecar (smoke)
        # Verifies the sidecar module imports, its FastAPI app is
        # constructed, and calculate_enhanced_rvs is reachable from the
        # wrapper's import path.
        run: |
          cd backend/python_rvs_service
          python -c "import main; assert main.app is not None; print('OK')"
